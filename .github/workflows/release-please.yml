name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple

  build:
    name: Build (${{ matrix.os }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: documents-classifier
          - os: windows-latest
            artifact: documents-classifier.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller --clean --noconfirm documents-classifier.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: documents-classifier-${{ matrix.os }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  attach-release-assets:
    name: Attach Binaries to Release
    runs-on: ubuntu-latest
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: documents-classifier-ubuntu-latest
          path: dist/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: documents-classifier-windows-latest
          path: dist/windows

      - name: Package artifacts
        run: |
          chmod +x dist/linux/documents-classifier
          cp config.yaml dist/linux/config.yaml
          cp config.yaml dist/windows/config.yaml
          tar -czf documents-classifier-${{ needs.release-please.outputs.tag_name }}-linux-amd64.tar.gz \
            -C dist/linux documents-classifier config.yaml
          zip -j documents-classifier-${{ needs.release-please.outputs.tag_name }}-windows-amd64.zip \
            dist/windows/documents-classifier.exe dist/windows/config.yaml

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            documents-classifier-${{ needs.release-please.outputs.tag_name }}-linux-amd64.tar.gz
            documents-classifier-${{ needs.release-please.outputs.tag_name }}-windows-amd64.zip
