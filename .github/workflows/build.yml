name: Build Binaries

on:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: documents-classifier
          - os: windows-latest
            artifact: documents-classifier.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller --clean --noconfirm documents-classifier.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: documents-classifier-${{ matrix.os }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
