name: Build Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: documents-classifier
          - os: windows-latest
            artifact: documents-classifier.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller --clean --noconfirm documents-classifier.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: documents-classifier-${{ matrix.os }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: documents-classifier-ubuntu-latest
          path: dist/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: documents-classifier-windows-latest
          path: dist/windows

      - name: Package artifacts
        run: |
          chmod +x dist/linux/documents-classifier
          tar -czf documents-classifier-${{ github.ref_name }}-linux-amd64.tar.gz \
            -C dist/linux documents-classifier
          zip -j documents-classifier-${{ github.ref_name }}-windows-amd64.zip \
            dist/windows/documents-classifier.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            documents-classifier-${{ github.ref_name }}-linux-amd64.tar.gz
            documents-classifier-${{ github.ref_name }}-windows-amd64.zip
